services:
  - type: web
    name: angaram-ai-api
    runtime: node
    rootDir: angaram-ai/backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: SESSION_TTL_MINUTES
        value: "30"
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: "10"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "20"
