services:
  - type: web
    name: angaram-ai-api
    runtime: node
    rootDir: angaram-ai/backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: SESSION_TTL_MINUTES
        value: "30"
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: "10"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "20"
